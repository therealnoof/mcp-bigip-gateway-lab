# Netplan configuration for GPU Server secondary interfaces
# Copy to /etc/netplan/60-lab-interfaces.yaml on the GPU Server (10.1.1.5)
#
# IMPORTANT: Verify interface names match your environment before applying.
# Run 'ip -br link show' to list interfaces and their MAC addresses.
# Adjust ens6/ens7 below if your interface names differ.
#
# Apply with: sudo netplan apply

network:
  version: 2
  ethernets:
    ens7:
      addresses:
        - 10.1.10.60/24
      # External network — agent reaches BIG-IP VIPs here
    ens6:
      addresses:
        - 10.1.20.50/24
      # Internal network — BIG-IP pools to MCP server here
