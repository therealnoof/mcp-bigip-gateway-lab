# ═══════════════════════════════════════════════════════════════
# BIG-IP APM as MCP Gateway — Demo Environment
# ═══════════════════════════════════════════════════════════════
#
# Architecture:
#   Agent → (OAuth 2.1) → BIG-IP APM → (Basic Auth) → MCP Server → Legacy HR API
#
# For standalone testing (no BIG-IP):
#   Agent → MCP Server → Legacy HR API
#
# Usage:
#   docker compose up -d                # Start all services
#   docker compose run --rm agent python agent.py test   # Test tools
#   docker compose run --rm agent python agent.py "Who has TS/SCI clearance?"
#
# ═══════════════════════════════════════════════════════════════

services:
  # ───────────────────────────────────────────────────────────
  # MCP SERVER
  # Wraps the legacy HR API as MCP tools.
  # In production, this sits behind BIG-IP APM.
  # For testing, the agent connects directly on port 8080.
  #
  # NOTE: The Legacy HR App runs on a separate VM (10.1.20.60).
  # See the Deployment Guide for HR App VM setup instructions.
  # ───────────────────────────────────────────────────────────
  mcp-server:
    build: ./mcp-server
    container_name: mcp-server
    ports:
      - "8080:8080"
    environment:
      - HR_API_BASE=http://10.1.20.60:5001
      - HR_API_USER=hr_service
      - HR_API_PASS=legacy_pass_2024
      - MCP_SERVER_PORT=8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/sse')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ───────────────────────────────────────────────────────────
  # OLLAMA — Local LLM Server
  # Runs the LLM that powers the agent's reasoning.
  # The model-puller sidecar downloads the model on first run.
  # ───────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.6.2
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_LOAD_TIMEOUT=10m
      - OLLAMA_KEEP_ALIVE=24h
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Sidecar that pulls the model on first startup
  model-puller:
    image: ollama/ollama:0.6.2
    container_name: model-puller
    depends_on:
      - ollama
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama to start...' &&
        sleep 10 &&
        ollama pull llama3.2:3b &&
        echo 'Model pull complete — warming into VRAM...' &&
        ollama run llama3.2:3b 'hi' &&
        echo 'Warmup complete — model resident in VRAM (OLLAMA_KEEP_ALIVE=24h).'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434

  # ───────────────────────────────────────────────────────────
  # AI AGENT
  # The MCP client that queries the HR system.
  # Container stays running so you can exec commands into it.
  # ───────────────────────────────────────────────────────────
  agent:
    build: ./agent
    container_name: agent
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      # ── Direct mode (no BIG-IP) ──
      # - AUTH_MODE=direct
      # - MCP_SERVER_URL=http://mcp-server:8080/sse
      # ── BIG-IP OAuth mode (ROPC) ──
      - AUTH_MODE=bigip
      - MCP_SERVER_URL=https://10.1.10.100/sse
      - BIGIP_TOKEN_URL=https://10.1.10.110/f5-oauth2/v1/token
      - BIGIP_CLIENT_ID=6c347e3dc69a6bd28477f4f1d8200ac620f091f1b4b7bd69
      - BIGIP_CLIENT_SECRET=107c0886f3835ed41978c954f766f72681c959ccb69e0ac620f091f1b4b7bd69
      - BIGIP_GRANT_TYPE=password
      - BIGIP_USERNAME=mcp-agent
      - BIGIP_PASSWORD=AgentPass2024!
    depends_on:
      mcp-server:
        condition: service_healthy
      ollama:
        condition: service_started

volumes:
  ollama_data:
